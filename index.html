<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-light">

    <div class="container py-4">
        <h1 class="text-center mb-4"> 📚 Sistema Escolar 👨‍🏫</h1>

        <div class="row">

            <div class="col-md-4">
                <div class="card shadow-sm p-3 mb-3">
                    <h5>🏫 Criar Sala</h5>
                    <input type="text" id="nomeSala" class="form-control mb-2" placeholder="Nome da Sala">
                    <label class="form-label invisible mb-1">.</label> <button class="btn btn-primary w-100" onclick="criarSala()">➕ Criar Sala</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm p-3 mb-3">
                    <h5>👨‍🎓 Cadastrar Alunos</h5>
                    <input type="text" id="nomeAluno" class="form-control mb-2" placeholder="Nome do Aluno">
                    <select id="selectSala" class="form-select mb-2">
                        <option value="" selected disabled>Selecione uma sala</option>
                    </select>
                    <button class="btn btn-success w-100" onclick="cadastrarAlunos()">✅ Cadastrar Aluno</button>
                    <button class="btn btn-outline-primary w-100 mt-2" onclick="alunoindividual()">📑 Ver Faltas Individuais</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm p-3 mb-3">
                    <h5>📝 Chamada</h5>
                    <input type="date" id="dataChamada" class="form-control mb-2">
                    <select id="filtroSala" class="form-select mb-2">
                        <option value="" selected disabled>Selecione uma sala</option>
                    </select>
                    <button class="btn btn-dark w-100" onclick="carregarChamada()">🔄 Carregar Chamada</button>
                    <button class="btn btn-info w-100 mt-2" onclick="media()">📊 Ver Média da Turma</button>
                    <button class="btn btn-dark w-100 mt-2" onclick="baixarBackup()">💾 Exportar Backup</button>
                </div>
            </div>
        </div>

        <div class="card shadow-sm p-3 mb-3">
            <h5>📋 Lista Geral de Alunos</h5>
            <ul id="listaAlunos" class="list-group"></ul>
        </div>

        <div class="card shadow-sm p-3">
            <h5>✔️ Registro de Presença</h5>
            <div id="chamada"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="./js/app.js"></script>
</body>

</html>
